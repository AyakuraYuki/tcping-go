name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: "${{ github.workflow }} - ${{ github.head_ref || github.ref }}"
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check tag is on main
        run: |
          TAG_COMMIT=$(git rev-list -n 1 ${{ github.ref_name }})
          if ! git rev-list origin/main | grep -q "$TAG_COMMIT"; then
            echo "❌ Tag is not from main branch"
            exit 1
          fi

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go test -v -bench=. ./...

  build:
    needs: check
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "0"
      VERSION: ${{ github.ref_name }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - { goos: darwin,    goarch: arm64,    target: macos_aarch64 }
          - { goos: darwin,    goarch: amd64,    target: macos_amd64 }
          # Windows
          - { goos: windows,   goarch: amd64,    target: windows_x64 }
          - { goos: windows,   goarch: "386",    target: windows_x86 }
          - { goos: windows,   goarch: arm64,    target: windows_arm }
          # Linux
          - { goos: linux,     goarch: "386",    target: linux_x86 }
          - { goos: linux,     goarch: amd64,    target: linux_amd64 }
          - { goos: linux,     goarch: arm64,    target: linux_arm64 }

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: mkdir -p build

      - run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags "-s -w -X main.version=${VERSION}" -o build/tcping-${{ matrix.target }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          draft: false
          files: build/tcping-${{ matrix.target }}
          prerelease: ${{ contains(github.ref_name, '-rc') }}
